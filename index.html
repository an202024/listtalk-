<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>极简交流社区</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --tb-blue: #2D64B3; }
        .tb-text { color: var(--tb-blue); }
        .tb-bg { background-color: var(--tb-blue); }
        
        /* 极致缩小图片：60x60 固定 */
        .compact-media {
            width: 60px !important;
            height: 60px !important;
            min-width: 60px;
            object-fit: cover;
            border-radius: 4px;
            flex-shrink: 0;
        }

        /* 列表标题限制 */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
            font-size: 13px;
        }
        
        /* 详情页滑入动画 */
        #detail-page {
            transition: transform 0.3s cubic-bezier(0, 0, 0.2, 1);
            transform: translateX(100%);
        }
        #detail-page.active { transform: translateX(0); }

        * { -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-100 pb-16">

    <header class="bg-white p-2 px-3 flex items-center border-b sticky top-0 z-50">
        <div class="flex-1 bg-gray-100 rounded-full py-1 px-3 text-gray-400 text-[11px]">搜索帖子...</div>
        <div id="nav-user" class="ml-3 tb-text font-bold text-[11px]" onclick="showAuth()">登录</div>
    </header>

    <div class="bg-white px-3 py-1 flex items-center border-b shadow-sm">
        <div class="w-6 h-6 rounded bg-blue-100 text-[10px] flex items-center justify-center tb-text font-bold">吧</div>
        <div class="ml-2 flex-1"><h1 class="text-[11px] font-bold text-gray-800">自由交流吧</h1></div>
        <button class="tb-bg text-white px-3 py-0.5 rounded-full text-[9px]">关注</button>
    </div>

    <div id="post-container" class="space-y-[1px] bg-gray-200"></div>

    <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around py-1 shadow-lg z-[60]">
        <div class="text-center tb-text"><div class="text-lg">🏠</div><span class="text-[8px]">首页</span></div>
        <div onclick="checkAuthAndOpenPost()" class="tb-bg text-white w-10 h-8 rounded-lg flex items-center justify-center text-xl shadow-lg -mt-2 border-2 border-white">+</div>
        <div class="text-center text-gray-400"><div class="text-lg">👤</div><span class="text-[8px]">我的</span></div>
    </nav>

    <div id="detail-page" class="fixed inset-0 bg-white z-[200] flex flex-col hidden">
        <div class="p-3 flex items-center border-b bg-white">
            <span onclick="closeDetail()" class="text-gray-600 text-xl px-2">←</span>
            <span class="font-bold text-sm ml-2">帖子详情</span>
        </div>
        <div class="p-4 flex-1 overflow-y-auto bg-white">
            <div class="flex items-center mb-4">
                <div class="w-8 h-8 bg-blue-50 rounded-full mr-3 flex items-center justify-center text-[10px] tb-text font-bold">U</div>
                <div>
                    <div id="detail-author" class="text-xs font-bold text-blue-800"></div>
                    <div id="detail-views" class="text-[10px] text-orange-500 font-bold"></div>
                </div>
            </div>
            <h2 id="detail-title" class="text-lg font-medium text-gray-900 leading-relaxed mb-4"></h2>
            <div id="detail-media" class="w-full"></div>
            <div class="mt-12 text-center text-gray-300 text-[10px]">--- 评论区功能维护中 ---</div>
        </div>
    </div>

    <div id="auth-modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-[300] p-6">
        <div class="bg-white rounded-2xl p-6 w-full max-w-xs shadow-2xl">
            <h2 class="text-sm font-bold mb-4 text-center">手机快捷登录</h2>
            <input id="phone" type="tel" maxlength="11" placeholder="请输入手机号" class="w-full p-2 bg-gray-50 rounded border text-sm mb-4 outline-none border-gray-200 focus:border-blue-500">
            <button onclick="doLogin()" class="w-full py-2 tb-bg text-white rounded font-bold text-xs active:opacity-90">登录进入</button>
            <p class="text-center text-[10px] text-gray-400 mt-4 px-4" onclick="closeModal('auth-modal')">取消</p>
        </div>
    </div>

    <div id="post-modal" class="fixed inset-0 bg-white hidden z-[100] flex flex-col">
        <div class="p-3 flex items-center border-b">
            <span onclick="closeModal('post-modal')" class="text-gray-500 text-xs">取消</span>
            <span class="flex-1 text-center font-bold text-xs">写新贴</span>
            <button onclick="submitPost()" class="tb-bg text-white px-5 py-1 rounded-full text-xs font-bold">发布</button>
        </div>
        <div class="p-4 flex-1">
            <textarea id="post-content" placeholder="分享点什么..." class="w-full h-32 text-sm outline-none resize-none"></textarea>
            <div id="media-preview" class="mt-4 flex gap-2"></div>
            <input type="file" id="file-input" class="hidden" onchange="handleFile(this)">
            <button onclick="document.getElementById('file-input').click()" class="mt-6 text-2xl bg-gray-50 p-3 rounded-xl border border-dashed border-gray-300">🖼️</button>
        </div>
    </div>
