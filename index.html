<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GZ022.US.CI - 官方内容精选</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --tb-blue: #2D64B3; }
        .tb-text { color: var(--tb-blue); }
        #group-detail-page, #auth-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #fff; z-index: 9999; display: none; flex-direction: column; }
        ::-webkit-scrollbar { display: none; }
        * { -webkit-tap-highlight-color: transparent; }
        .photo-card { border-radius: 0.75rem; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden; aspect-ratio: 1/1; background: #f9fafb; border: 1px solid #f3f4f6; }
        .content-card { border-radius: 1rem; box-shadow: 0 4px 12px -2px rgba(0,0,0,0.08); border: 1px solid #f3f4f6; }
        .active-scale:active { transform: scale(0.96); transition: 0.1s; }
    </style>
</head>
<body class="bg-gray-50 pb-12">

    <header class="bg-white p-4 flex flex-col border-b sticky top-0 z-50 shadow-sm">
        <div class="flex items-center justify-between w-full mb-1">
            <div class="font-black text-xl tb-text tracking-tighter uppercase italic leading-none">GZ022.US.CI</div>
            <div class="flex items-center gap-3">
                <button onclick="openAuth()" id="login-status-btn" class="text-[12px] font-bold text-gray-400 border px-3 py-1 rounded-full active-scale">游客注册/登录</button>
                <div onclick="if(window.Tawk_API) window.Tawk_API.toggle()" class="flex items-center gap-1.5 cursor-pointer active-scale text-green-500 font-bold text-[13px]">● 客服在线</div>
            </div>
        </div>
    </header>

    <div class="max-w-4xl mx-auto p-4">
        <h2 class="font-black text-gray-800 text-[15px] mb-4">🔥 今日热门</h2>
        <div id="main-grid" class="grid grid-cols-3 gap-2.5"></div>
    </div>

    <div class="max-w-4xl mx-auto p-4 border-t border-gray-100 mt-2">
        <h2 class="font-bold text-gray-800 text-[14px] italic mb-1">💬 客户反馈</h2>
        <p class="text-[10px] text-blue-500 mb-4 tracking-tighter">提示：注册后即可留言，只限文字。</p>
        <div id="feedback-container" class="space-y-4"></div>
    </div>

    <div id="group-detail-page" class="overflow-y-auto">
        <div class="p-4 flex items-center border-b sticky top-0 bg-white z-50 justify-between">
            <div class="flex items-center">
                <button onclick="closeGroupDetail()" class="text-gray-600 text-3xl mr-4 px-2">←</button>
                <span id="group-title" class="font-bold text-sm">内容详情</span>
            </div>
            <div id="admin-upload-ctrl" class="hidden">
                <input type="file" id="batch-file" multiple accept="image/*" class="hidden" onchange="handleBatchUpload()">
                <label for="batch-file" class="bg-black text-white px-5 py-2 rounded-full text-xs font-black active-scale uppercase">Upload (Max 6)</label>
            </div>
        </div>
        <div id="related-grid" class="p-4 grid grid-cols-2 gap-4"></div>
        <div id="status-msg" class="hidden text-center py-10 font-bold text-blue-600 animate-pulse text-sm">正在同步到云端数据库...</div>
    </div>

    <div id="auth-modal" class="justify-center items-center px-10 bg-black/40">
        <div class="bg-white w-full rounded-[2.5rem] p-8 shadow-2xl">
            <h3 class="font-black text-center mb-6 uppercase tracking-widest text-gray-800">User Access</h3>
            <input id="user-input" type="text" placeholder="用户名" class="w-full bg-gray-50 rounded-xl p-4 mb-4 outline-none border text-sm">
            <input id="pwd-input" type="password" placeholder="密码" class="w-full bg-gray-50 rounded-xl p-4 mb-6 outline-none border text-sm">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black active-scale mb-3">登录</button>
            <button onclick="handleRegister()" class="w-full bg-gray-100 text-gray-500 py-4 rounded-xl font-bold active-scale">游客注册</button>
            <button onclick="closeAuth()" class="w-full text-gray-300 text-xs mt-6">返回首页</button>
        </div>
    </div>

    <script>
        const SB_URL = "https://rdqnfgslchwzxrvzluyg.supabase.co";
        const SB_KEY = "sb_publishable_lpKx8N7N6s3JNKbcmqyBGQ_to3pZXQk";
        const client = supabase.createClient(SB_URL, SB_KEY);

        let activeGroupId = null;
        let is_admin_mode = false;
        let logged_user = null;

        window.onload = () => { renderMainGrid(); fetchFeedbacks(); };

        // 1. 登录逻辑 (管理员硬编码)
        function handleLogin() {
            const user = document.getElementById('user-input').value;
            const pass = document.getElementById('pwd-input').value;

            if(user === 'admin' && pass === 'admin2020') {
                is_admin_mode = true;
                logged_user = '管理员';
                alert("管理员登录成功");
                updateUIStatus();
                closeAuth();
            } else {
                // 此处可扩展从自定义用户表查询
                logged_user = user;
                alert("游客登录成功: " + user);
                updateUIStatus();
                closeAuth();
            }
        }

        function updateUIStatus() {
            document.getElementById('login-status-btn').innerText = "已登录: " + logged_user;
            if(is_admin_mode) document.getElementById('admin-upload-ctrl').classList.remove('hidden');
        }

        // 2. 首页网格渲染
        async function renderMainGrid() {
            const grid = document.getElementById('main-grid');
            const { data } = await client.from('gallery').select('*').order('created_at', { ascending: true });
            let html = '';
            for(let i=1; i<=18; i++) {
                const coverImg = data?.find(item => item.group_id == i)?.img_url;
                html += `
                <div onclick="openGroupDetail(${i})" class="photo-card active-scale">
                    ${coverImg ? `<img src="${coverImg}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-gray-200 text-2xl font-black italic">${i}</div>`}
                </div>`;
            }
            grid.innerHTML = html;
        }

        // 3. 详情与批量上传
        async function openGroupDetail(id) {
            activeGroupId = id;
            document.getElementById('group-detail-page').style.display = 'flex';
            const { data } = await client.from('gallery').select('*').eq('group_id', id).limit(6);
            const grid = document.getElementById('related-grid');
            grid.innerHTML = (data || []).map(item => `
                <div class="flex flex-col gap-2">
                    <div class="photo-card border-none shadow-none"><img src="${item.img_url}" class="w-full h-full object-cover rounded-2xl"></div>
                    <div class="text-[11px] text-gray-400 text-center truncate px-1">官方精选内容</div>
                </div>
            `).join('');
            if(is_admin_mode) document.getElementById('admin-upload-ctrl').classList.remove('hidden');
        }

        async function handleBatchUpload() {
            const files = document.getElementById('batch-file').files;
            if (files.length > 6) return alert("最多6张照片");
            document.getElementById('status-msg').classList.remove('hidden');
            
            for (let file of files) {
                const path = `GZ_${activeGroupId}_${Date.now()}_${Math.random().toString(36).substr(2,5)}.jpg`;
                const { data, error } = await client.storage.from('photos').upload(path, file);
                if (!error) {
                    const url = `${SB_URL}/storage/v1/object/public/photos/${path}`;
                    await client.from('gallery').insert([{ img_url: url, group_id: activeGroupId, description: "官方内容" }]);
                }
            }
            location.reload();
        }

        async function fetchFeedbacks() {
            const { data } = await client.from('customer_feedback').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('feedback-container').innerHTML = data.map(f => `
                    <div class="bg-white p-5 content-card active:bg-gray-50">
                        <div class="text-[12px] font-black text-blue-600 mb-1 uppercase">${f.user_name || '游客'}</div>
                        <div class="text-[14px] text-gray-600">${f.content}</div>
                    </div>
                `).join('');
            }
        }

        function handleRegister() { alert("注册功能已开放，输入用户名密码直接登录即可自动保存。"); }
        function openAuth() { document.getElementById('auth-modal').style.display = 'flex'; }
        function closeAuth() { document.getElementById('auth-modal').style.display = 'none'; }
        function closeGroupDetail() { document.getElementById('group-detail-page').style.display = 'none'; }
    </script>

    <script type="text/javascript">
    var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
    (function(){
    var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
    s1.async=true; s1.src='https://embed.tawk.to/67ede97a6e37941913988636/1imrtg97t';
    s1.charset='UTF-8'; s1.setAttribute('crossorigin','*'); s0.parentNode.insertBefore(s1,s0);
    })();
    </script>
</body>
</html>
