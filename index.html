<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GZ022.US.CI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
:root { --tb-blue:#2D64B3; }
.tb-text { color:var(--tb-blue); }

#detail-page,#video-page,#video-play-page{
position:fixed;top:0;left:0;right:0;bottom:0;
background:#fff;z-index:9999;display:none;flex-direction:column;
}

::-webkit-scrollbar{display:none;}
.content-card{border-radius:1rem;box-shadow:0 4px 10px rgba(0,0,0,.1);}
.video-card{border-radius:1.25rem;box-shadow:0 4px 8px rgba(0,0,0,.1);}
</style>
</head>

<body class="bg-gray-50 pb-12">

<!-- 头部 -->
<header class="bg-white p-4 flex items-center border-b sticky top-0 z-50">
<div class="flex-1 font-black text-xl tb-text">GZ022.US.CI</div>

<!-- ✅ 客服入口（已修复） -->
<div onclick="openChat()" class="flex items-center gap-1 cursor-pointer">
<span id="chat-dot" class="w-2 h-2 bg-gray-400 rounded-full"></span>
<span id="chat-text" class="text-gray-400 text-sm font-bold">加载中...</span>
</div>
</header>

<!-- 视频 -->
<div class="p-4">
<h2 class="font-bold mb-3">热门视频</h2>
<div id="video-box" class="flex gap-3"></div>
</div>

<!-- 文章 -->
<div class="p-4">
<div id="post-box"></div>
</div>

<!-- 视频播放 -->
<div id="video-play-page" class="bg-black">
<button onclick="closeVideo()" class="text-white p-4">关闭</button>
<video id="player" controls class="w-full"></video>
</div>

<script>
const videos=[
{title:"演示A",cover:"https://picsum.photos/200?1",url:"https://www.w3schools.com/html/mov_bbb.mp4"},
{title:"演示B",cover:"https://picsum.photos/200?2",url:"https://www.w3schools.com/html/mov_bbb.mp4"}
];

const posts=[
{title:"公告",content:"点击右上角联系客服"}
];

window.onload=()=>{
renderVideos();
renderPosts();
};

// 渲染视频
function renderVideos(){
document.getElementById("video-box").innerHTML=
videos.map(v=>`
<div onclick="play('${v.url}')" class="flex-1 video-card overflow-hidden">
<img src="${v.cover}">
</div>
`).join('');
}

// 渲染文章
function renderPosts(){
document.getElementById("post-box").innerHTML=
posts.map(p=>`
<div class="bg-white p-4 content-card mb-3">
<div class="font-bold">${p.title}</div>
<div class="text-gray-400 text-sm">${p.content}</div>
</div>
`).join('');
}

// 播放视频
function play(url){
let p=document.getElementById("player");
p.src=url;
document.getElementById("video-play-page").style.display="flex";
p.play();
}
function closeVideo(){
document.getElementById("video-play-page").style.display="none";
document.getElementById("player").pause();
}

</script>

<!-- ✅ 客服系统（核心修复） -->
<script>
var Tawk_API=Tawk_API||{},Tawk_LoadStart=new Date();
let chatReady=false;

// ✅ 加载完成
Tawk_API.onLoad=function(){
chatReady=true;

// UI变绿
document.getElementById("chat-dot").classList.remove("bg-gray-400");
document.getElementById("chat-dot").classList.add("bg-green-500");

document.getElementById("chat-text").innerText="● 客服在线";
document.getElementById("chat-text").classList.remove("text-gray-400");
document.getElementById("chat-text").classList.add("text-green-500");
};

// ✅ 打开客服
function openChat(){
if(chatReady && window.Tawk_API){
window.Tawk_API.maximize(); // 比 toggle 更稳定
}else{
alert("客服加载中，请稍后");
}
}

// 加载脚本
(function(){
var s1=document.createElement("script"),
s0=document.getElementsByTagName("script")[0];

s1.async=true;
s1.src='https://embed.tawk.to/67ede97a6e37941913988636/1imrtg97t';
s1.charset='UTF-8';
s1.setAttribute('crossorigin','*');

s0.parentNode.insertBefore(s1,s0);
})();
</script>

</body>
</html>
