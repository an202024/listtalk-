<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>社区-手机版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --tb-blue: #2D64B3; }
        .tb-text { color: var(--tb-blue); }
        .tb-bg { background-color: var(--tb-blue); }
        .hidden { display: none; }
        /* 隐藏滚动条 */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-100 pb-20">

    <header class="bg-white p-3 flex items-center border-b sticky top-0 z-50 shadow-sm">
        <div class="flex-1 bg-gray-100 rounded-full py-1 px-4 text-gray-400 text-sm flex items-center">
            <span>🔍 搜索你感兴趣的内容...</span>
        </div>
        <div id="nav-user" class="ml-4 tb-text font-bold text-sm" onclick="showAuth()">登录/注册</div>
    </header>

    <div class="h-28 bg-blue-600 bg-cover bg-center" style="background-image: url('https://picsum.photos/800/200')"></div>
    <div class="bg-white p-4 flex items-end -mt-6 px-4 rounded-t-3xl shadow-sm">
        <div class="w-16 h-16 bg-white border-2 border-white rounded-2xl shadow overflow-hidden">
            <img src="https://picsum.photos/150" class="w-full h-full">
        </div>
        <div class="ml-3 mb-1">
            <h1 class="text-lg font-bold">自由交流吧</h1>
            <p class="text-[10px] text-gray-400">今日发帖 +128 | 成员 5.2万</p>
        </div>
        <button class="ml-auto mb-1 tb-bg text-white px-5 py-1 rounded-full text-xs font-bold">+ 关注</button>
    </div>

    <div id="post-container" class="mt-2 space-y-2 px-2">
        <div class="bg-white p-4 rounded-xl">
            <div class="flex items-center mb-2">
                <div class="w-8 h-8 bg-gray-200 rounded-full mr-2"></div>
                <span class="text-xs font-bold text-gray-700">资深吧友</span>
                <span class="ml-auto text-[10px] text-gray-400">浏览量：1,205</span>
            </div>
            <h3 class="text-gray-800 text-md font-medium">今天天气不错，上海的外滩人好多啊！</h3>
            <div class="mt-2 rounded-lg overflow-hidden">
                <img src="https://picsum.photos/500/300?random=1" class="w-full">
            </div>
            <div class="flex justify-around mt-4 pt-3 border-t text-gray-400 text-xs">
                <span>💬 24 回复</span>
                <span>👍 赞</span>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around py-2 shadow-2xl z-50">
        <div class="text-center tb-text"><div class="text-xl">🏠</div><span class="text-[10px]">首页</span></div>
        <div onclick="checkAuthAndOpenPost()" class="tb-bg text-white w-12 h-10 rounded-2xl flex items-center justify-center text-3xl font-light shadow-lg -mt-4 border-4 border-gray-100">+</div>
        <div class="text-center text-gray-400"><div class="text-xl">👤</div><span class="text-[10px]">我的</span></div>
    </nav>

    <div id="auth-modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-[100] p-6">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm">
            <h2 class="text-2xl font-bold mb-6 text-center">快捷注册/登录</h2>
            <input id="phone" type="tel" placeholder="请输入手机号码" class="w-full p-4 bg-gray-100 rounded-2xl mb-4 outline-none border-2 focus:border-blue-500">
            <div class="flex gap-2 mb-6">
                <input type="text" placeholder="验证码" class="flex-1 p-4 bg-gray-100 rounded-2xl outline-none">
                <button onclick="sendCode()" class="px-4 tb-text font-bold">获取验证码</button>
            </div>
            <button onclick="doLogin()" class="w-full py-4 tb-bg text-white rounded-2xl font-bold text-lg shadow-lg">进入社区</button>
            <p class="text-center text-xs text-gray-400 mt-4" onclick="closeModal('auth-modal')">稍后再说</p>
        </div>
    </div>

    <div id="post-modal" class="fixed inset-0 bg-white hidden z-[100] flex flex-col">
        <div class="p-4 flex items-center border-b">
            <span onclick="closeModal('post-modal')" class="text-gray-500 text-lg">取消</span>
            <span class="flex-1 text-center font-bold">发布新帖子</span>
            <button onclick="submitPost()" class="tb-bg text-white px-6 py-1 rounded-full text-sm font-bold">发布</button>
        </div>
        <div class="p-4 flex-1 overflow-y-auto">
            <textarea id="post-content" placeholder="分享你的新鲜事..." class="w-full h-32 text-lg outline-none resize-none"></textarea>
            <div id="media-preview" class="grid grid-cols-3 gap-2 mt-4"></div>
            
            <div class="mt-8 flex gap-6">
                <label class="flex flex-col items-center">
                    <span class="text-2xl">🖼️</span>
                    <span class="text-[10px] text-gray-500">图片</span>
                    <input type="file" accept="image/*" class="hidden" onchange="handleFile(this, 'img')">
                </label>
                <label class="flex flex-col items-center">
                    <span class="text-2xl">📹</span>
                    <span class="text-[10px] text-gray-500">视频</span>
                    <input type="file" accept="video/*" class="hidden" onchange="handleFile(this, 'video')">
                </label>
            </div>
            <p class="text-[10px] text-gray-400 mt-4">提示：视频需小于10M且在10秒内</p>
        </div>
    </div>

    <script>
        let isLogin = false;
        let userPhone = "";
        let mediaData = null;

        // --- 功能 1：注册登录逻辑 ---
        function showAuth() { document.getElementById('auth-modal').classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        
        function sendCode() {
            const phone = document.getElementById('phone').value;
            if(!/^1[3-9]\d{9}$/.test(phone)) return alert("请输入正确手机号");
            alert("验证码已发送（模拟）：1234");
        }

        function doLogin() {
            userPhone = document.getElementById('phone').value;
            if(!userPhone) return alert("请输入手机号");
            isLogin = true;
            document.getElementById('nav-user').innerText = "我的: " + userPhone.substring(7);
            closeModal('auth-modal');
            alert("注册登录成功！");
        }

        // --- 功能 2：发帖逻辑 ---
        function checkAuthAndOpenPost() {
            if(!isLogin) return showAuth();
            document.getElementById('post-modal').classList.remove('hidden');
        }

        function handleFile(input, type) {
            const file = input.files[0];
            if(!file) return;

            if(type === 'video') {
                if(file.size > 10 * 1024 * 1024) return alert("视频不能超过10M");
                // 模拟时长检查（实际需加载video元数据）
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('media-preview');
                mediaData = { type, url: e.target.result };
                preview.innerHTML = type === 'img' 
                    ? `<img src="${e.target.result}" class="w-full h-24 object-cover rounded-lg">`
                    : `<video src="${e.target.result}" class="w-full h-24 object-cover rounded-lg" muted></video>`;
            };
            reader.readAsDataURL(file);
        }

        function submitPost() {
            const content = document.getElementById('post-content').value;
            if(!content && !mediaData) return alert("写点什么吧");

            // --- 功能 3：浏览量显示 ---
            const viewCount = Math.floor(Math.random() * 100); // 初始浏览量随机 0-100

            const newPost = `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-blue-50">
                    <div class="flex items-center mb-2">
                        <div class="w-8 h-8 bg-blue-100 rounded-full mr-2 flex items-center justify-center text-[10px] tb-text">访客</div>
                        <span class="text-xs font-bold text-gray-700">${userPhone.substring(0,3)}****${userPhone.substring(7)}</span>
                        <span class="ml-auto text-[10px] text-gray-400">浏览量：${viewCount}</span>
                    </div>
                    <h3 class="text-gray-800 text-md">${content}</h3>
                    ${mediaData ? (mediaData.type === 'img' ? `<img src="${mediaData.url}" class="mt-2 rounded-lg w-full">` : `<video src="${mediaData.url}" controls class="mt-2 rounded-lg w-full"></video>`) : ''}
                    <div class="flex justify-around mt-4 pt-3 border-t text-gray-400 text-[10px]">
                        <span onclick="alert('回复功能已开启')">💬 评论回复</span>
                        <span>👍 赞</span>
                    </div>
                </div>
            `;

            document.getElementById('post-container').insertAdjacentHTML('afterbegin', newPost);
            
            // 清空并关闭
            document.getElementById('post-content').value = "";
            document.getElementById('media-preview').innerHTML = "";
            mediaData = null;
            closeModal('post-modal');
        }
    </script>
</body>
</html>
