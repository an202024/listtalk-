<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GZ022.US.CI - 官方内容精选</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --tb-blue: #2D64B3; }
        .tb-text { color: var(--tb-blue); }
        #detail-page, #video-page, #video-play-page { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #fff; z-index: 9999; display: none; flex-direction: column; }
        ::-webkit-scrollbar { display: none; }
        * { -webkit-tap-highlight-color: transparent; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        /* 严格还原 image_eb7de0.jpg 的阴影与圆角 */
        .content-card { border-radius: 1rem; box-shadow: 0 4px 10px -2px rgba(0,0,0,0.1); border: 1px solid #f3f4f6; }
        .video-card { border-radius: 1.25rem; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-50 pb-12">

    <header class="bg-white p-4 flex items-center border-b sticky top-0 z-50">
        <div class="flex-1 font-black text-xl tb-text tracking-tighter uppercase">GZ022.US.CI</div>
        <div onclick="if(window.Tawk_API) window.Tawk_API.toggle()" class="flex items-center gap-1.5 px-2 py-1 cursor-pointer active:opacity-60">
            <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
            <span class="text-green-500 text-[13px] font-bold">● 客服在线</span>
        </div>
    </header>

    <div class="max-w-4xl mx-auto p-4">
        <div class="flex justify-between items-end mb-4">
            <h2 class="font-bold text-gray-800 text-[14px]">🎬 热门视频</h2>
            <span onclick="openVideoPage()" class="text-gray-400 text-[10px] cursor-pointer">查看全部内容 ></span>
        </div>
        <div id="home-video-container" class="flex gap-3"></div>
    </div>

    <div class="max-w-4xl mx-auto p-4">
        <h2 class="font-bold text-gray-800 text-[14px] mb-4 italic">📌 精选资讯</h2>
        <div id="post-container" class="space-y-4"></div>

        <div class="flex justify-center items-center gap-10 py-12">
            <button id="prev-btn" onclick="changePage(-1)" class="px-8 py-1.5 border bg-white rounded-full text-[11px] text-gray-300 disabled:opacity-20 shadow-sm">上一页</button>
            <span id="page-info" class="text-[10px] font-bold text-gray-300">PAGE 1</span>
            <button id="next-btn" onclick="changePage(1)" class="px-8 py-1.5 border bg-white rounded-full text-[11px] text-gray-300 disabled:opacity-20 shadow-sm">下一页</button>
        </div>
    </div>

    <footer class="text-center pb-10">
        <a href="https://github.com/an202024/listtalk-/edit/main/index.html" target="_blank" class="text-[9px] text-gray-200 tracking-widest uppercase">Admin Portal</a>
    </footer>

    <div id="video-play-page" class="bg-black">
        <div class="p-4 z-50 flex justify-between"><button onclick="closeVideoPlay()" class="text-white text-2xl">✕</button></div>
        <div class="flex-1 flex items-center justify-center"><video id="main-player" class="w-full max-h-[85vh]" controls playsinline autoplay></video></div>
    </div>
    <div id="detail-page">
        <div class="p-4 flex items-center border-b sticky top-0 bg-white z-50"><button onclick="closeDetail()" class="text-gray-600 text-2xl mr-4">←</button><span class="font-bold text-sm">内容正文</span></div>
        <div id="detail-content" class="p-6 overflow-y-auto"></div>
    </div>
    <div id="video-page">
        <div class="p-4 flex items-center border-b sticky top-0 bg-white z-50"><button onclick="closeVideoPage()" class="text-gray-600 text-2xl mr-4">←</button><span class="font-bold text-sm">视频全集</span></div>
        <div id="video-list-grid" class="grid grid-cols-2 gap-4 p-4"></div>
    </div>

    <script>
        const posts = [
            { id: 1, title: "如何获得更流畅的观看体验？", content: "建议在高速网络环境下观看视频。如果您点击视频后加载较慢，可以尝试刷新页面。所有的视频内容均经过工业级压缩处理，确保在移动端也能快速响应。", images: ["https://picsum.photos/800/400?sig=50"] },
            { id: 2, title: "官方公告：GZ022.US.CI 正式上线", content: "欢迎访问我们的官方频道！如有任何咨询需求，请点击页面右下角的在线客服图标，或者点击顶部的【客服在线】，我们将为您提供真人即时服务。", images: ["https://picsum.photos/800/400?sig=51"] }
        ];

        const videos = [
            { id: 1, title: "演示 A", cover: "https://picsum.photos/400/600?sig=1", url: "https://www.w3schools.com/html/mov_bbb.mp4" },
            { id: 2, title: "演示 B", cover: "https://picsum.photos/400/600?sig=2", url: "https://www.w3schools.com/html/mov_bbb.mp4" },
            { id: 3, title: "演示 C", cover: "https://picsum.photos/400/600?sig=3", url: "https://www.w3schools.com/html/mov_bbb.mp4" }
        ];

        let currentPage = 1;
        const postsPerPage = 20;

        window.onload = () => { renderHomeVideos(); renderPosts(); };

        function renderHomeVideos() {
            document.getElementById('home-video-container').innerHTML = videos.slice(0, 3).map(v => `
                <div onclick="playVideo('${v.url}')" class="flex-1 aspect-[3/4] relative video-card overflow-hidden bg-gray-200 active:scale-95 transition-all">
                    <img src="${v.cover}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 flex items-center justify-center bg-black/10 text-white text-3xl">▶</div>
                    <div class="absolute bottom-0 p-2 text-white text-[10px] bg-gradient-to-t from-black/60 w-full truncate font-bold tracking-tight">${v.title}</div>
                </div>
            `).join('');
        }

        function renderPosts() {
            const container = document.getElementById('post-container');
            const start = (currentPage - 1) * postsPerPage;
            const pageData = posts.slice().reverse().slice(start, start + postsPerPage);
            container.innerHTML = pageData.map(p => `
                <div onclick="openDetail(${p.id})" class="bg-white p-5 content-card active:bg-gray-50 transition-all relative">
                    <div class="text-[16px] font-bold text-gray-900 mb-2 leading-tight pr-20">${p.title}</div>
                    <div class="text-[12px] text-gray-400 line-clamp-2 mb-2 leading-relaxed pr-24">${p.content}</div>
                    <img src="${p.images[0]}" class="w-20 h-20 object-cover rounded-xl absolute right-5 bottom-5 border border-gray-100">
                </div>
            `).join('');
            document.getElementById('page-info').innerText = `PAGE ${currentPage}`;
            document.getElementById('prev-btn').disabled = currentPage === 1;
            document.getElementById('next-btn').disabled = (start + postsPerPage) >= posts.length;
        }

        function playVideo(url) { const p = document.getElementById('main-player'); p.src = url; document.getElementById('video-play-page').style.display = 'flex'; p.play(); }
        function closeVideoPlay() { document.getElementById('main-player').pause(); document.getElementById('video-play-page').style.display = 'none'; }
        function openDetail(id) {
            const p = posts.find(x => x.id === id);
            document.getElementById('detail-content').innerHTML = `<h1 class="text-xl font-bold mb-4">${p.title}</h1><div class="text-sm text-gray-600 mb-6 whitespace-pre-wrap leading-relaxed">${p.content}</div>${p.images.map(img => `<img src="${img}" class="w-full rounded-2xl mb-4 shadow-md">`).join('')}`;
            document.getElementById('detail-page').style.display = 'flex';
        }
        function closeDetail() { document.getElementById('detail-page').style.display = 'none'; }
        function openVideoPage() { document.getElementById('video-page').style.display = 'flex'; renderVideoGrid(); }
        function closeVideoPage() { document.getElementById('video-page').style.display = 'none'; }
        function changePage(step) { currentPage += step; window.scrollTo(0,0); renderPosts(); }
        function renderVideoGrid() { document.getElementById('video-list-grid').innerHTML = videos.map(v => `<div onclick="playVideo('${v.url}')" class="relative aspect-[3/4] rounded-2xl overflow-hidden shadow-md"><img src="${v.cover}" class="w-full h-full object-cover"><div class="absolute bottom-0 p-3 bg-black/40 w-full text-white text-xs font-bold">${v.title}</div></div>`).join(''); }
    </script>

    <script type="text/javascript">
    var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
    (function(){
    var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
    s1.async=true;
    s1.src='https://embed.tawk.to/67ede97a6e37941913988636/1imrtg97t';
    s1.charset='UTF-8';
    s1.setAttribute('crossorigin','*');
    s0.parentNode.insertBefore(s1,s0);
    })();
    </script>
</body>
</html>
