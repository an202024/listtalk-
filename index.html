<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>官方内容精选 - GZ022</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --tb-blue: #2D64B3; }
        .tb-text { color: var(--tb-blue); }
        .tb-bg { background-color: var(--tb-blue); }
        #detail-page, #video-page, #video-play-page { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #fff; z-index: 9999; display: none; flex-direction: column; }
        ::-webkit-scrollbar { display: none; }
        * { -webkit-tap-highlight-color: transparent; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-gray-50 pb-16">

    <header class="bg-white p-4 flex items-center border-b sticky top-0 z-50 shadow-sm">
        <div class="flex-1 font-black text-xl tb-text tracking-tighter">GZ022.US.CI</div>
        <div class="flex items-center gap-1 bg-green-50 px-2 py-1 rounded-full">
            <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
            <span class="text-green-600 text-[10px] font-bold">客服在线</span>
        </div>
    </header>

    <div class="max-w-4xl mx-auto p-3">
        <div class="flex justify-between items-end mb-3">
            <h2 class="font-bold text-gray-800 text-sm flex items-center">
                <span class="mr-1">🎬</span> 热门视频
            </h2>
            <span onclick="openVideoPage()" class="text-gray-400 text-[10px] active:text-blue-600">查看全部内容 ></span>
        </div>
        <div id="home-video-container" class="flex gap-2.5">
            </div>
    </div>

    <div class="max-w-4xl mx-auto p-3">
        <h2 class="font-bold text-gray-800 text-sm mb-3 flex items-center">
            <span class="mr-1">📌</span> 精选资讯
        </h2>
        <div id="post-container" class="space-y-3">
            </div>

        <div class="flex justify-center items-center gap-8 py-10">
            <button id="prev-btn" onclick="changePage(-1)" class="px-6 py-1.5 border bg-white rounded-full text-xs text-gray-500 disabled:opacity-30 shadow-sm">上一页</button>
            <span id="page-info" class="text-[11px] font-bold text-gray-400">PAGE 1</span>
            <button id="next-btn" onclick="changePage(1)" class="px-6 py-1.5 border bg-white rounded-full text-xs text-gray-500 disabled:opacity-30 shadow-sm">下一页</button>
        </div>
    </div>

    <div id="video-play-page" class="bg-black">
        <div class="p-4 z-50 flex justify-between items-center">
            <button onclick="closeVideoPlay()" class="text-white text-2xl">✕</button>
            <span class="text-white text-xs opacity-50">正在播放官方视频</span>
        </div>
        <div class="flex-1 flex items-center justify-center">
            <video id="main-player" class="w-full max-h-[80vh]" controls playsinline autoplay></video>
        </div>
    </div>

    <div id="detail-page">
        <div class="p-4 flex items-center border-b sticky top-0 bg-white z-50">
            <button onclick="closeDetail()" class="text-gray-600 text-2xl mr-4">←</button>
            <span class="font-bold text-sm">内容正文</span>
        </div>
        <div id="detail-content" class="p-6 overflow-y-auto">
            </div>
    </div>

    <div id="video-page">
        <div class="p-4 flex items-center border-b sticky top-0 bg-white z-50">
            <button onclick="closeVideoPage()" class="text-gray-600 text-2xl mr-4">←</button>
            <span class="font-bold text-sm">视频全集</span>
        </div>
        <div id="video-list-grid" class="grid grid-cols-2 gap-3 p-4 overflow-y-auto">
            </div>
    </div>

    <script>
        // ==========================================
        // 管理员数据配置区（在此处直接增删内容）
        // ==========================================
        
        // 帖子数据
        const posts = [
            { 
                id: 1001, 
                title: "官方公告：GZ022.US.CI 正式上线", 
                content: "欢迎访问我们的官方频道！如有任何商务咨询或技术支持需求，请点击页面右下角的绿色在线客服图标，我们的人员将为您提供真人即时服务。\n\n目前支持：\n1. 视频展示\n2. 实时咨询\n3. 官方资讯发布", 
                images: ["https://picsum.photos/800/400?sig=100"] 
            },
            { 
                id: 1002, 
                title: "如何获得更流畅的观看体验？", 
                content: "建议在高速网络环境下观看视频。如果您点击视频后加载较慢，可以尝试刷新页面。所有的视频内容均经过工业级压缩处理，确保在移动端也能快速响应。", 
                images: ["https://picsum.photos/800/400?sig=101"] 
            }
        ];

        // 视频数据（URL 建议替换为你 GitHub 仓库里的 Raw 链接）
        const videos = [
            { id: 1, title: "演示视频 A", cover: "https://picsum.photos/400/600?sig=201", url: "https://www.w3schools.com/html/mov_bbb.mp4" },
            { id: 2, title: "演示视频 B", cover: "https://picsum.photos/400/600?sig=202", url: "https://www.w3schools.com/html/mov_bbb.mp4" },
            { id: 3, title: "演示视频 C", cover: "https://picsum.photos/400/600?sig=203", url: "https://www.w3schools.com/html/mov_bbb.mp4" },
            { id: 4, title: "演示视频 D", cover: "https://picsum.photos/400/600?sig=204", url: "https://www.w3schools.com/html/mov_bbb.mp4" }
        ];

        // 分页逻辑变量
        let currentPage = 1;
        const postsPerPage = 20;

        window.onload = () => {
            renderHomeVideos();
            renderPosts();
        };

        // 渲染首页前三个视频
        function renderHomeVideos() {
            const container = document.getElementById('home-video-container');
            container.innerHTML = videos.slice(0, 3).map(v => `
                <div onclick="playVideo('${v.url}')" class="flex-1 aspect-[3/4] relative rounded-2xl overflow-hidden shadow-md active:scale-95 transition-transform bg-gray-200">
                    <img src="${v.cover}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 flex items-center justify-center bg-black/10 text-white text-3xl">▶</div>
                    <div class="absolute bottom-0 p-2 text-white text-[10px] bg-gradient-to-t from-black w-full truncate font-bold">${v.title}</div>
                </div>
            `).join('');
        }

        // 渲染帖子列表
        function renderPosts() {
            const container = document.getElementById('post-container');
            const start = (currentPage - 1) * postsPerPage;
            const pageData = posts.slice().reverse().slice(start, start + postsPerPage);
            
            container.innerHTML = pageData.map(p => `
                <div onclick="openDetail(${p.id})" class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 active:bg-gray-50 transition-colors">
                    <div class="text-[15px] font-bold text-gray-900 mb-1">${p.title}</div>
                    <div class="text-[12px] text-gray-400 line-clamp-2 leading-relaxed">${p.content}</div>
                </div>
            `).join('');
            
            document.getElementById('page-info').innerText = `PAGE ${currentPage}`;
            document.getElementById('prev-btn').disabled = currentPage === 1;
            document.getElementById('next-btn').disabled = (start + postsPerPage) >= posts.length;
        }

        // 播放控制
        function playVideo(url) {
            const player = document.getElementById('main-player');
            player.src = url;
            document.getElementById('video-play-page').style.display = 'flex';
            player.load();
            player.play();
        }

        function closeVideoPlay() {
            const player = document.getElementById('main-player');
            player.pause();
            player.src = "";
            document.getElementById('video-play-page').style.display = 'none';
        }

        // 详情与专区控制
        function openDetail(id) {
            const p = posts.find(x => x.id === id);
            document.getElementById('detail-content').innerHTML = `
                <h1 class="text-xl font-bold mb-4 text-gray-900">${p.title}</h1>
                <div class="text-sm text-gray-600 leading-relaxed mb-8 whitespace-pre-wrap">${p.content}</div>
                ${p.images.map(img => `<img src="${img}" class="w-full rounded-2xl mb-4 shadow-lg border border-gray-100">`).join('')}
            `;
            document.getElementById('detail-page').style.display = 'flex';
        }

        function closeDetail() { document.getElementById('detail-page').style.display = 'none'; }

        function openVideoPage() {
            const grid = document.getElementById('video-list-grid');
            grid.innerHTML = videos.map(v => `
                <div onclick="playVideo('${v.url}')" class="relative aspect-[3/4] rounded-2xl overflow-hidden shadow-lg active:scale-95 transition-transform bg-gray-100">
                    <img src="${v.cover}" class="w-full h-full object-cover">
                    <div class="absolute bottom-0 p-3 bg-gradient-to-t from-black w-full text-white text-xs font-bold">${v.title}</div>
                </div>
            `).join('');
            document.getElementById('video-page').style.display = 'flex';
        }

        function closeVideoPage() { document.getElementById('video-page').style.display = 'none'; }
        
        function changePage(step) {
            currentPage += step;
            window.scrollTo(0, 0);
            renderPosts();
        }
    </script>

    </body>
</html>
