<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GZ022.US.CI - 官方内容精选</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --tb-blue: #2D64B3; }
        .tb-text { color: var(--tb-blue); }
        #group-detail-page, #auth-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #fff; z-index: 9999; display: none; flex-direction: column; }
        ::-webkit-scrollbar { display: none; }
        .photo-card { border-radius: 0.75rem; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden; aspect-ratio: 1/1; background: #f9fafb; border: 1px solid #f3f4f6; position: relative; }
        .content-card { border-radius: 1rem; box-shadow: 0 4px 12px -2px rgba(0,0,0,0.08); border: 1px solid #f3f4f6; }
        .active-scale:active { transform: scale(0.96); transition: 0.1s; }
    </style>
</head>
<body class="bg-gray-50 pb-32">

    <header class="bg-white p-4 flex justify-between items-center border-b sticky top-0 z-50 shadow-sm">
        <div class="font-black text-xl tb-text uppercase italic">GZ022.US.CI</div>
        <div class="flex items-center gap-3">
            <button onclick="openAuth()" id="login-status-btn" class="text-[12px] font-bold text-gray-400 border px-3 py-1 rounded-full active-scale">管理员登录</button>
            <div onclick="if(window.Tawk_API) window.Tawk_API.toggle()" class="flex items-center gap-1.5 cursor-pointer active-scale text-green-500 font-bold text-[13px]">● 客服在线</div>
        </div>
    </header>

    <div class="max-w-4xl mx-auto p-4">
        <h2 class="font-black text-gray-800 text-[15px] mb-4 uppercase tracking-widest">🔥 Today's Picks</h2>
        <div id="main-grid" class="grid grid-cols-3 gap-2.5"></div>
    </div>

    <div class="max-w-4xl mx-auto p-4 border-t border-gray-100 mt-4">
        <h2 class="font-bold text-gray-800 text-[14px] mb-3 uppercase">📝 发表留言</h2>
        <div class="flex gap-2">
            <input id="comment-input" type="text" maxlength="50" placeholder="欢迎在此直接留言..." class="flex-1 bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500">
            <button id="comment-btn" onclick="submitComment()" class="bg-blue-600 text-white px-6 py-3 rounded-xl text-sm font-black active-scale shadow-md">提交</button>
        </div>
    </div>

    <div class="max-w-4xl mx-auto p-4 border-t border-gray-100 mt-2">
        <h2 class="font-bold text-gray-800 text-[14px] italic mb-1 uppercase">💬 Feedbacks</h2>
        <div id="feedback-container" class="space-y-4 mt-4"></div>
    </div>

    <div id="group-detail-page" class="overflow-y-auto">
        <div class="p-4 flex items-center border-b sticky top-0 bg-white z-[10000] justify-between shadow-sm">
            <div class="flex items-center">
                <button onclick="closeGroupDetail()" class="text-gray-600 text-3xl mr-4 px-2">←</button>
                <span class="font-black text-sm uppercase">Detail View</span>
            </div>
            <div id="admin-upload-ctrl" class="hidden">
                <input type="file" id="batch-file" multiple accept="image/*" class="hidden" onchange="handleBatchUpload()">
                <label for="batch-file" class="bg-black text-white px-5 py-2 rounded-full text-xs font-black active-scale cursor-pointer uppercase shadow-lg">Upload</label>
            </div>
        </div>
        <div id="related-grid" class="p-4 grid grid-cols-2 gap-4"></div>
        <div id="status-msg" class="hidden text-center py-6 font-bold text-blue-600 animate-pulse text-sm">处理中，请稍候...</div>
    </div>

    <div id="auth-modal" class="justify-center items-center px-10 bg-black/40">
        <div class="bg-white w-full rounded-[2.5rem] p-8 shadow-2xl">
            <h3 class="font-black text-center mb-6 uppercase tracking-widest text-gray-800">Admin Login</h3>
            <input id="user-input" type="text" placeholder="Username" class="w-full bg-gray-50 rounded-xl p-4 mb-4 outline-none border text-sm">
            <input id="pwd-input" type="password" placeholder="Password" class="w-full bg-gray-50 rounded-xl p-4 mb-6 outline-none border text-sm">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black w-full active-scale shadow-lg">进入后台</button>
            <button onclick="closeAuth()" class="w-full text-gray-300 text-xs py-4 uppercase font-bold mt-2">BACK</button>
        </div>
    </div>

    <script>
        const SB_URL = "https://rdqnfgsichwzxrvzluyg.supabase.co";
        const SB_KEY = "sb_publishable_lpKx8N7N6s3JNKbcmqyBGQ_to3pZXQk";
        const client = supabase.createClient(SB_URL, SB_KEY);

        let activeGroupId = null;
        let is_admin = sessionStorage.getItem('is_admin') === 'true';

        window.onload = () => { 
            if(is_admin) {
                document.getElementById('login-status-btn').innerText = "Admin On";
                document.getElementById('login-status-btn').style.color = "#2D64B3";
            }
            renderMainGrid(); 
            fetchFeedbacks(); 
        };

        function handleLogin() {
            const u = document.getElementById('user-input').value;
            const p = document.getElementById('pwd-input').value;
            if(u === 'admin' && p === 'admin2020') {
                sessionStorage.setItem('is_admin', 'true');
                location.reload(); 
            } else { 
                alert("账号或密码错误"); 
            }
        }

        async function renderMainGrid() {
            const { data, error } = await client.from('gallery').select('*').order('created_at', { ascending: true });
            if (error) console.error("获取首页数据失败", error);

            const grid = document.getElementById('main-grid');
            let html = '';
            for(let i=1; i<=18; i++) {
                const groupPhotos = data?.filter(item => item.group_id == i);
                const coverImg = (groupPhotos && groupPhotos.length > 0) ? groupPhotos[0].img_url : null;
                html += `<div onclick="openGroupDetail(${i})" class="photo-card active-scale">${coverImg ? `<img src="${coverImg}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-gray-200 text-2xl font-black italic">${i}</div>`}</div>`;
            }
            grid.innerHTML = html;
        }

        async function openGroupDetail(id) {
            activeGroupId = id;
            document.getElementById('group-detail-page').style.display = 'flex';
            
            const { data, error } = await client.from('gallery').select('*').eq('group_id', id).order('created_at', { ascending: true });
            
            if (error) {
                alert("获取详情数据失败: " + error.message);
                return;
            }

            const grid = document.getElementById('related-grid');
            if (data && data.length > 0) {
                // ✅ 仅管理员可见删除按钮
                grid.innerHTML = data.map(item => `
                    <div class="photo-card border-none shadow-none">
                        <img src="${item.img_url}" class="w-full h-full object-cover rounded-2xl">
                        ${is_admin ? `<button onclick="deletePhoto('${item.id}', '${item.img_url}')" class="absolute top-2 right-2 bg-red-500/80 text-white w-7 h-7 rounded-full text-[10px] font-black active-scale flex items-center justify-center">✕</button>` : ''}
                    </div>
                `).join('');
            } else {
                grid.innerHTML = `<div class="col-span-2 py-20 text-center text-gray-300 text-xs italic">空文件夹</div>`;
            }
            
            if(is_admin) document.getElementById('admin-upload-ctrl').classList.remove('hidden');
        }

        // ✅ 新增：双重物理删除照片功能
        async function deletePhoto(id, imgUrl) {
            if(!confirm("⚠️ 确定要永久删除这张照片吗？")) return;

            const statusMsg = document.getElementById('status-msg');
            statusMsg.classList.remove('hidden');
            statusMsg.innerText = "正在删除...";

            try {
                // 1. 从 Storage 删除物理文件 (截取 URL 最后的照片文件名)
                const fileName = imgUrl.split('/').pop();
                await client.storage.from('photos').remove([fileName]);

                // 2. 从 Database 移除记录
                const { error: dbErr } = await client.from('gallery').delete().eq('id', id);
                if (dbErr) throw dbErr;

                // 3. 刷新视图
                await openGroupDetail(activeGroupId);
                await renderMainGrid();

            } catch (err) {
                alert("删除失败: " + err.message);
            } finally {
                statusMsg.classList.add('hidden');
                statusMsg.innerText = "处理中，请稍候...";
            }
        }

        async function handleBatchUpload() {
            const fileInput = document.getElementById('batch-file');
            const files = fileInput.files;
            
            if (files.length === 0) return;
            if (files.length > 6) return alert("一次最多只能选择 6 张照片");

            const statusMsg = document.getElementById('status-msg');
            statusMsg.classList.remove('hidden');
            
            let successCount = 0;

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const path = `GZ_${activeGroupId}_${Date.now()}_${Math.random().toString(36).substr(2,6)}.jpg`;
                
                const { error: upErr } = await client.storage.from('photos').upload(path, file);

                if (upErr) {
                    alert(`第 ${i+1} 张照片上传失败: ` + upErr.message);
                    continue;
                }

                const { data: pData } = client.storage.from('photos').getPublicUrl(path);

                const { error: dbErr } = await client.from('gallery').insert([{
                    img_url: pData.publicUrl,
                    group_id: activeGroupId,
                    description: "Official"
                }]);

                if (dbErr) {
                    alert(`第 ${i+1} 张照片存入数据库失败: ` + dbErr.message);
                } else {
                    successCount++;
                }
            }

            statusMsg.classList.add('hidden');
            fileInput.value = ""; 

            if (successCount > 0) {
                await openGroupDetail(activeGroupId);
                await renderMainGrid(); 
            }
        }

        async function submitComment() {
            const inputEl = document.getElementById('comment-input');
            const val = inputEl.value.trim();
            if(!val) return alert("不能提交空留言");

            const btn = document.getElementById('comment-btn');
            btn.disabled = true;
            btn.innerText = "处理中";

            const user_name = "访客_" + Math.floor(Math.random()*9999);
            
            const { error } = await client.from('customer_feedback').insert([{ 
                user_name: user_name, 
                content: val.substring(0, 50) 
            }]);
            
            if(error) {
                alert("留言提交失败: " + error.message);
            } else {
                inputEl.value = ""; 
                await fetchFeedbacks(); 
            }

            btn.disabled = false;
            btn.innerText = "提交";
        }

        async function fetchFeedbacks() {
            const { data, error } = await client.from('customer_feedback').select('*').order('created_at', { ascending: false });
            
            const container = document.getElementById('feedback-container');
            if (error) {
                container.innerHTML = `<div class="text-red-500 text-xs">无法加载留言: ${error.message}</div>`;
                return;
            }

            if (data && data.length > 0) {
                container.innerHTML = data.map(f => `
                    <div class="bg-white p-5 content-card active:bg-gray-50 transition-all">
                        <div class="text-[12px] font-black text-blue-600 mb-1 uppercase">${f.user_name}</div>
                        <div class="text-[14px] text-gray-600 font-medium leading-relaxed">${f.content}</div>
                    </div>
                `).join('');
            } else {
                container.innerHTML = `<div class="text-center text-gray-300 py-6 text-xs italic">尚无留言，做第一个发言的人吧</div>`;
            }
        }

        function openAuth() { document.getElementById('auth-modal').style.display = 'flex'; }
        function closeAuth() { document.getElementById('auth-modal').style.display = 'none'; }
        function closeGroupDetail() { document.getElementById('group-detail-page').style.display = 'none'; activeGroupId = null; }
    </script>
</body>
</html>
