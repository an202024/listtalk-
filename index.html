<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>官方内容精选 - GZ022</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --tb-blue: #2D64B3; }
        .tb-text { color: var(--tb-blue); }
        .tb-bg { background-color: var(--tb-blue); }
        #detail-page, #video-page, #video-play-page { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #fff; z-index: 9999; display: none; flex-direction: column; }
        ::-webkit-scrollbar { display: none; }
        .active-scale:active { transform: scale(0.95); transition: 0.1s; }
    </style>
</head>
<body class="bg-gray-50 pb-20">

    <header class="bg-white p-4 flex items-center border-b sticky top-0 z-50 shadow-sm">
        <div class="flex-1 font-black text-xl tb-text">GZ022.US.CI</div>
        
        <div onclick="openChatSmart()" class="flex items-center gap-2 bg-green-100 px-4 py-2 rounded-full cursor-pointer active-scale border border-green-200">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
            <span class="text-green-700 text-[14px] font-bold">客服在线</span>
        </div>
    </header>

    <div class="max-w-4xl mx-auto p-3">
        <div id="home-video-container" class="flex gap-2.5 mb-6"></div>
        <div id="post-container" class="space-y-3"></div>
    </div>

    <script>
        const posts = [{ id: 1, title: "官方公告：GZ022 服务正常", content: "欢迎浏览精品内容。如果右下角没有出现聊天图标，请直接点击上方【客服在线】按钮进行对话。", images: ["https://picsum.photos/400/300?sig=88"] }];
        const videos = [{ id: 1, title: "演示 01", cover: "https://picsum.photos/400/600?sig=1", url: "https://www.w3schools.com/html/mov_bbb.mp4" }];

        window.onload = () => { renderHomeVideos(); renderPosts(); };

        // --- 核心修复：智能打开客服 ---
        function openChatSmart() {
            // 方案 A：尝试唤起嵌入式窗口
            if (window.Tawk_API && window.Tawk_API.maximize) {
                window.Tawk_API.maximize();
            } else {
                // 方案 B：如果插件没加载，直接跳转到你的专属聊天页
                // 注意：请将下方的链接换成你 Tawk.to 后台的 Direct Chat Link
                window.open('https://tawk.to/chat/67ede97a6e37941913988636/1imrtg97t', '_blank');
            }
        }

        function renderHomeVideos() {
            document.getElementById('home-video-container').innerHTML = videos.map(v => `
                <div onclick="playVideo('${v.url}')" class="flex-1 aspect-[3/4] relative rounded-2xl overflow-hidden shadow-sm bg-gray-200 active-scale">
                    <img src="${v.cover}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 flex items-center justify-center bg-black/10 text-white text-3xl">▶</div>
                </div>
            `).join('');
        }

        function renderPosts() {
            document.getElementById('post-container').innerHTML = posts.map(p => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 active-scale">
                    <div class="font-bold mb-1">${p.title}</div>
                    <div class="text-xs text-gray-400 mb-2">${p.content}</div>
                    <img src="${p.images[0]}" class="w-24 h-16 object-cover rounded-lg">
                </div>
            `).join('');
        }

        function playVideo(url) { const p = document.getElementById('main-player'); p.src = url; document.getElementById('video-play-page').style.display = 'flex'; p.play(); }
        function closeVideoPlay() { document.getElementById('main-player').pause(); document.getElementById('video-play-page').style.display = 'none'; }
    </script>

    <script type="text/javascript">
    var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
    (function(){
    var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
    s1.async=true;
    s1.src='https://embed.tawk.to/67ede97a6e37941913988636/1imrtg97t';
    s1.charset='UTF-8';
    s1.setAttribute('crossorigin','*');
    s0.parentNode.insertBefore(s1,s0);
    })();
    </script>

    <div id="video-play-page" class="bg-black">
        <div class="p-4 z-50"><button onclick="closeVideoPlay()" class="text-white text-2xl">✕</button></div>
        <div class="flex-1 flex items-center justify-center"><video id="main-player" class="w-full max-h-[80vh]" controls playsinline></video></div>
    </div>
</body>
</html>
