<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>自由交流社区</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --tb-blue: #2D64B3; }
        .tb-text { color: var(--tb-blue); }
        .tb-bg { background-color: var(--tb-blue); }
        #detail-page, #video-page { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #fff; z-index: 9999; display: none; flex-direction: column; }
        * { -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-100 pb-20">

    <header class="bg-white p-2 px-3 flex items-center border-b sticky top-0 z-50 shadow-sm">
        <div class="flex-1 bg-gray-100 rounded-full py-1 px-3 text-gray-400 text-[11px]">搜索帖子...</div>
        <div id="nav-user" class="ml-3 tb-text font-bold text-[11px]" onclick="showAuth()">登录 / 注册</div>
    </header>

    <div class="bg-white px-3 py-1 flex items-center border-b mb-2">
        <div class="w-6 h-6 rounded bg-blue-100 flex items-center justify-center text-[10px] tb-text font-bold">吧</div>
        <div class="ml-2 flex-1"><h1 class="text-[11px] font-bold text-gray-800">自由交流吧</h1></div>
        <button class="tb-bg text-white px-3 py-0.5 rounded-full text-[9px]">关注</button>
    </div>

    <div class="max-w-6xl mx-auto px-0 md:px-2 mb-2">
        <div class="bg-white border rounded p-3 shadow-sm">
            <div class="flex justify-between items-center border-b pb-1 mb-2">
                <div class="text-[11px] font-bold text-gray-800">热门视频</div>
                <div class="flex gap-2 items-center">
                    <button id="btn-post-video" onclick="showVideoModal()" class="hidden tb-bg text-white text-[9px] px-2 py-0.5 rounded">发布视频</button>
                    <button onclick="openVideoPage()" class="text-gray-500 text-[9px]">查看全部 ></button>
                </div>
            </div>
            <div id="home-video-container" class="flex gap-2 justify-between cursor-pointer" onclick="openVideoPage()"></div>
        </div>
    </div>

    <div class="max-w-4xl mx-auto px-0 md:px-2">
        <div id="post-container" class="space-y-[1px] bg-gray-200"></div>
        
        <div class="flex justify-center items-center gap-4 py-6 bg-white border-t">
            <button id="prev-btn" onclick="changePage(-1)" class="px-4 py-1 border rounded text-xs text-gray-500 disabled:opacity-30">上一页</button>
            <span id="page-info" class="text-xs font-bold text-gray-600">第 1 页</span>
            <button id="next-btn" onclick="changePage(1)" class="px-4 py-1 border rounded text-xs text-gray-500 disabled:opacity-30">下一页</button>
        </div>
    </div>

    <div id="detail-page"><div class="p-3 flex items-center border-b bg-white"><button onclick="closeDetail()" class="text-gray-600 text-2xl px-2">←</button></div><div class="p-4 flex-1 overflow-y-auto"><div class="flex items-center mb-4"><div id="dt-avatar-container"></div><div class="ml-3"><div id="dt-author" class="text-xs font-bold text-blue-800"></div><div id="dt-views" class="text-[10px] text-orange-500 font-bold"></div></div></div><h2 id="dt-title" class="text-base mb-4"></h2><div id="dt-media" class="w-full flex flex-col gap-2"></div></div></div>
    <div id="video-page"><div class="p-3 flex items-center border-b bg-white sticky top-0"><button onclick="closeVideoPage()" class="text-gray-600 text-2xl px-2">←</button></div><div class="flex-1 overflow-y-auto p-2"><div id="video-list-grid" class="grid grid-cols-2 gap-2"></div></div></div>

    <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around py-1 shadow-lg z-50">
        <div class="text-center tb-text"><div class="text-lg">🏠</div><span class="text-[8px]">首页</span></div>
        <div onclick="checkAuthAndOpenPost()" class="tb-bg text-white w-10 h-8 rounded-lg flex items-center justify-center text-xl shadow-lg -mt-2 border-2 border-white">+</div>
        <div class="text-center text-gray-400"><div class="text-lg">👤</div><span class="text-[8px]">我的</span></div>
    </nav>

    <div id="auth-modal" class="fixed inset-0 bg-black/60 z-[10000] flex items-center justify-center p-6" style="display: none;">
        <div class="bg-white rounded-2xl p-6 w-full max-w-xs text-center">
            <h2 id="auth-title" class="text-sm font-bold mb-4">用户登录</h2>
            <input id="username" type="text" placeholder="用户名" class="w-full p-2 bg-gray-50 rounded border text-sm mb-3 outline-none">
            <input id="password" type="password" placeholder="密码" class="w-full p-2 bg-gray-50 rounded border text-sm mb-4 outline-none">
            <div class="flex gap-2">
                <button onclick="doLogin()" class="flex-1 py-2 tb-bg text-white rounded font-bold text-xs">登录</button>
                <button onclick="doRegister()" class="flex-1 py-2 border border-blue-600 tb-text rounded font-bold text-xs">注册</button>
            </div>
            <p class="text-[10px] text-gray-400 mt-4" onclick="closeModal('auth-modal')">关闭</p>
        </div>
    </div>

    <div id="post-modal" class="fixed inset-0 bg-white z-[5000] flex flex-col" style="display: none;">
        <div class="p-3 flex items-center border-b">
            <span onclick="closeModal('post-modal')" class="text-gray-500 text-xs">取消</span>
            <span class="flex-1 text-center font-bold text-xs">发布内容</span>
            <button onclick="submitPost()" class="tb-bg text-white px-5 py-1 rounded-full text-xs font-bold">发布</button>
        </div>
        <div class="p-4 flex-1">
            <textarea id="post-content" maxlength="1000" placeholder="分享你的想法..." class="w-full h-40 text-sm outline-none resize-none"></textarea>
            <div id="media-preview" class="mt-4 flex flex-wrap gap-2"></div>
            <div id="image-upload-section" class="hidden">
                <input type="file" id="file-input" class="hidden" multiple accept="image/*" onchange="handleFile(this)">
                <button onclick="document.getElementById('file-input').click()" class="mt-6 text-2xl p-3 bg-gray-50 rounded-xl border border-dashed">🖼️ 上传图片</button>
                <p class="text-[10px] text-gray-400 mt-1">管理员特权：最多支持 6 张图片</p>
            </div>
        </div>
    </div>

    <div id="video-modal" class="fixed inset-0 bg-white z-[5000] flex flex-col" style="display: none;"><div class="p-3 flex items-center border-b"><span onclick="closeModal('video-modal')" class="text-gray-500 text-xs">取消</span><span class="flex-1 text-center font-bold text-xs">发视频</span><button onclick="submitVideo()" class="bg-red-500 text-white px-5 py-1 rounded-full text-xs font-bold">发布</button></div><div class="p-4 flex-1"><textarea id="video-title" placeholder="视频标题" class="w-full h-20 outline-none"></textarea><div id="video-cover-preview" class="mt-2"></div><input type="file" id="video-file-input" class="hidden" accept="image/*" onchange="handleVideoFile(this)"><button onclick="document.getElementById('video-file-input').click()" class="mt-4 p-3 bg-gray-50 border rounded">📷 上传封面</button></div></div>

    <script>
        let isLogin = false, myName = "";
        let posts = [], videos = [];
        let currentPage = 1;
        const postsPerPage = 20;
        let users = { "admin": "admin123" }; // 模拟本地数据库
        let mediaFiles = [];

        window.onload = function() {
            // 初始化 45 条测试数据
            for(let i=0; i<45; i++) {
                posts.push({
                    id: i, user: "admin", text: `这是管理员发布的第 ${i+1} 条帖子示例。`,
                    images: [`https://picsum.photos/400/300?sig=${i}`], views: Math.floor(Math.random()*500 + 1)
                });
            }
            renderPosts();
            // 初始化视频
            for(let i=0; i<6; i++) videos.push({id:i, title:`视频${i}`, cover:`https://picsum.photos/300/400?sig=${i+50}`, author:"官方"});
            renderHomeVideos();
        };

        function renderPosts() {
            const container = document.getElementById('post-container');
            container.innerHTML = '';
            
            const start = (currentPage - 1) * postsPerPage;
            const end = start + postsPerPage;
            const pagePosts = posts.slice().reverse().slice(start, end);

            pagePosts.forEach(p => {
                const imgHtml = (p.images && p.images.length > 0) ? `<div class="flex flex-wrap gap-1 mt-2">${p.images.slice(0,3).map(src=>`<img src="${src}" class="w-20 h-20 object-cover rounded">`).join('')}</div>` : '';
                const delBtn = (isLogin && myName === 'admin') ? `<button onclick="deletePost(${p.id}, event)" class="text-red-500 text-[10px] ml-4">删除</button>` : '';
                
                const html = `
                    <div onclick="openDetail(${p.id})" class="bg-white p-3 border-b active:bg-gray-50">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[10px] font-bold text-blue-800">${p.user}</span>
                            <div class="flex items-center"><span class="text-[9px] text-gray-400">👁️ ${p.views}</span>${delBtn}</div>
                        </div>
                        <div class="text-[13px] text-gray-800 line-clamp-2">${p.text}</div>
                        ${imgHtml}
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });

            document.getElementById('page-info').innerText = `第 ${currentPage} 页 / 共 ${Math.ceil(posts.length/postsPerPage)} 页`;
            document.getElementById('prev-btn').disabled = currentPage === 1;
            document.getElementById('next-btn').disabled = end >= posts.length;
        }

        function changePage(step) {
            currentPage += step;
            window.scrollTo(0, 0);
            renderPosts();
        }

        function doRegister() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(u.length < 2) return alert("用户名太短");
            if(users[u]) return alert("用户已存在");
            users[u] = p;
            alert("注册成功，请点击登录");
        }

        function doLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(users[u] && users[u] === p) {
                isLogin = true; myName = u;
                document.getElementById('nav-user').innerText = myName;
                closeModal('auth-modal');
                updatePermissions();
            } else {
                alert("账号或密码错误");
            }
        }

        function updatePermissions() {
            const uploadSection = document.getElementById('image-upload-section');
            const videoBtn = document.getElementById('btn-post-video');
            
            // 只有 admin 可以看到图片上传和视频发布按钮
            if(myName === 'admin') {
                uploadSection.classList.remove('hidden');
                videoBtn.classList.remove('hidden');
            } else {
                uploadSection.classList.add('hidden');
                videoBtn.classList.add('hidden');
            }
        }

        function checkAuthAndOpenPost() {
            if(!isLogin) showAuth(); 
            else {
                document.getElementById('post-modal').style.display = 'flex';
                updatePermissions();
            }
        }

        function handleFile(input) {
            const files = Array.from(input.files).slice(0, 6);
            mediaFiles = []; document.getElementById('media-preview').innerHTML = "";
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = e => {
                    mediaFiles.push(e.target.result);
                    document.getElementById('media-preview').insertAdjacentHTML('beforeend', `<img src="${e.target.result}" class="w-16 h-16 object-cover border rounded">`);
                };
                reader.readAsDataURL(file);
            });
        }

        function submitPost() {
            const txt = document.getElementById('post-content').value;
            if(!txt) return alert("请输入内容");
            // 再次校验：如果不是admin却有图片，强行清空图片
            const finalImages = (myName === 'admin') ? [...mediaFiles] : [];
            
            const newP = { id: Date.now(), user: myName, text: txt, images: finalImages, views: 1 };
            posts.push(newP);
            currentPage = 1;
            renderPosts();
            closeModal('post-modal');
            document.getElementById('post-content').value = "";
            document.getElementById('media-preview').innerHTML = "";
            mediaFiles = [];
        }

        function deletePost(id, event) {
            event.stopPropagation();
            if(myName !== 'admin') return;
            if(confirm("确定删除？")) {
                posts = posts.filter(p => p.id !== id);
                renderPosts();
            }
        }

        // 基础 UI 控制函数
        function showAuth() { document.getElementById('auth-modal').style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function openDetail(id) { 
            const p = posts.find(x=>x.id===id); 
            p.views++; 
            document.getElementById('dt-author').innerText = p.user;
            document.getElementById('dt-title').innerText = p.text;
            document.getElementById('dt-views').innerText = `👁️ ${p.views}`;
            document.getElementById('dt-media').innerHTML = p.images.map(s=>`<img src="${s}" class="w-full rounded mb-2">`).join('');
            document.getElementById('detail-page').style.display='flex'; 
        }
        function closeDetail() { document.getElementById('detail-page').style.display='none'; }
        function openVideoPage() { document.getElementById('video-page').style.display='flex'; renderVideoGrid(); }
        function closeVideoPage() { document.getElementById('video-page').style.display='none'; }
        function renderVideoGrid() {
            const g = document.getElementById('video-list-grid'); g.innerHTML = '';
            videos.forEach(v => {
                g.insertAdjacentHTML('beforeend', `<div class="relative aspect-[3/4] bg-gray-200 rounded overflow-hidden"><img src="${v.cover}" class="w-full h-full object-cover"><div class="absolute bottom-0 p-1 bg-black/40 w-full text-white text-[10px]">${v.title}</div></div>`);
            });
        }
        function renderHomeVideos() {
            const c = document.getElementById('home-video-container'); c.innerHTML = '';
            videos.slice(0,3).forEach(v => {
                c.insertAdjacentHTML('beforeend', `<div class="flex-1 aspect-[3/4] relative rounded overflow-hidden bg-gray-100"><img src="${v.cover}" class="w-full h-full object-cover"><div class="absolute bottom-0 p-1 text-white text-[8px] bg-black/20 w-full truncate">${v.title}</div></div>`);
            });
        }
        function showVideoModal() { document.getElementById('video-modal').style.display = 'flex'; }
        function submitVideo() { alert("视频发布功能仅供演示"); closeModal('video-modal'); }
    </script>

    <script src="https://lf-cdn.coze.cn/obj/unpkg/flow-web-client/boot.js"></script>
    <script>
        new CozeWebSDK.WebChatClient({
            config: { bot_id: '7624462263939842091' },
            componentProps: {
                title: '客服小李',
                layoutProps: { style: { bottom: '80px', zIndex: 99999 } }
            }
        });
    </script>
</body>
</html>
