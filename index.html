<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>官方内容精选 - GZ022</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --tb-blue: #2D64B3; }
        .tb-text { color: var(--tb-blue); }
        .tb-bg { background-color: var(--tb-blue); }
        #detail-page, #video-page, #video-play-page { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #fff; z-index: 9999; display: none; flex-direction: column; }
        ::-webkit-scrollbar { display: none; }
        * { -webkit-tap-highlight-color: transparent; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .active-scale:active { transform: scale(0.95); transition: 0.1s; }
    </style>
</head>
<body class="bg-gray-50 pb-20">

    <header class="bg-white p-4 flex items-center border-b sticky top-0 z-50 shadow-sm">
        <div class="flex-1 font-black text-xl tb-text tracking-tighter">GZ022.US.CI</div>
        
        <div onclick="forceOpenChat()" class="flex items-center gap-2 bg-green-100 px-4 py-2 rounded-full cursor-pointer active-scale border border-green-200">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
            <span class="text-green-700 text-[14px] font-bold tracking-wide">客服在线</span>
        </div>
    </header>

    <div class="max-w-4xl mx-auto p-3">
        <div class="flex justify-between items-end mb-3 px-1">
            <h2 class="font-bold text-gray-800 text-sm italic">🎬 热门视频</h2>
            <span onclick="openVideoPage()" class="text-gray-400 text-[10px] cursor-pointer">查看全部 ></span>
        </div>
        <div id="home-video-container" class="flex gap-2.5"></div>
    </div>

    <div class="max-w-4xl mx-auto p-3">
        <h2 class="font-bold text-gray-800 text-sm mb-3 px-1 italic">📌 精品选择</h2>
        <div id="post-container" class="space-y-3"></div>

        <div class="flex justify-center items-center gap-8 py-10">
            <button id="prev-btn" onclick="changePage(-1)" class="px-6 py-1.5 border bg-white rounded-full text-xs text-gray-500 disabled:opacity-30">上一页</button>
            <span id="page-info" class="text-[11px] font-bold text-gray-400 font-mono">PAGE 1</span>
            <button id="next-btn" onclick="changePage(1)" class="px-6 py-1.5 border bg-white rounded-full text-xs text-gray-500 disabled:opacity-30">下一页</button>
        </div>
    </div>

    <footer class="text-center py-6">
        <a href="https://github.com/an202024/listtalk-/edit/main/index.html" target="_blank" class="text-[10px] text-gray-300 hover:text-gray-500 transition-colors tracking-widest">ADMIN LOGIN / 管理后台</a>
    </footer>

    <div id="video-play-page" class="bg-black">
        <div class="p-4 z-50 flex justify-between"><button onclick="closeVideoPlay()" class="text-white text-2xl">✕</button></div>
        <div class="flex-1 flex items-center justify-center"><video id="main-player" class="w-full max-h-[80vh]" controls playsinline autoplay></video></div>
    </div>
    <div id="detail-page">
        <div class="p-4 flex items-center border-b sticky top-0 bg-white z-50"><button onclick="closeDetail()" class="text-gray-600 text-2xl mr-4">←</button><span class="font-bold text-sm">内容正文</span></div>
        <div id="detail-content" class="p-6 overflow-y-auto"></div>
    </div>
    <div id="video-page">
        <div class="p-4 flex items-center border-b sticky top-0 bg-white z-50"><button onclick="closeVideoPage()" class="text-gray-600 text-2xl mr-4">←</button><span class="font-bold text-sm">视频全集</span></div>
        <div id="video-list-grid" class="grid grid-cols-2 gap-3 p-4 overflow-y-auto"></div>
    </div>

    <script>
        // 内容库
        const posts = [
            { id: 1, title: "官方公告：GZ022 服务升级完毕", content: "我们已完成系统优化，现在您可以更流畅地浏览精品内容。任何问题欢迎点击上方客服按钮。", images: ["https://picsum.photos/400/300?sig=10"] }
        ];

        const videos = [
            { id: 1, title: "演示视频 01", cover: "https://picsum.photos/400/600?sig=1", url: "https://www.w3schools.com/html/mov_bbb.mp4" },
            { id: 2, title: "演示视频 02", cover: "https://picsum.photos/400/600?sig=2", url: "https://www.w3schools.com/html/mov_bbb.mp4" },
            { id: 3, title: "演示视频 03", cover: "https://picsum.photos/400/600?sig=3", url: "https://www.w3schools.com/html/mov_bbb.mp4" }
        ];

        let currentPage = 1;
        const postsPerPage = 20;

        window.onload = () => { renderHomeVideos(); renderPosts(); };

        // --- 核心修复：强制唤起客服 ---
        function forceOpenChat() {
            try {
                if (window.Tawk_API && window.Tawk_API.maximize) {
                    window.Tawk_API.maximize(); // 强制展开对话框
                } else {
                    // 如果 API 没准备好，尝试直接点击 Tawk.to 的原生元素
                    const tawkIframe = document.querySelector('iframe[title="chat widget"]');
                    if (tawkIframe) {
                        alert("请点击页面右下角的浮动气泡进行对话");
                    } else {
                        alert("客服模块正在加载中，请稍等 3 秒后再试...");
                    }
                }
            } catch (e) {
                console.error("客服调用失败", e);
            }
        }

        // 渲染函数
        function renderHomeVideos() {
            const container = document.getElementById('home-video-container');
            container.innerHTML = videos.slice(0, 3).map(v => `
                <div onclick="playVideo('${v.url}')" class="flex-1 aspect-[3/4] relative rounded-2xl overflow-hidden shadow-sm bg-gray-200 active-scale">
                    <img src="${v.cover}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 flex items-center justify-center bg-black/10 text-white text-3xl">▶</div>
                    <div class="absolute bottom-0 p-2 text-white text-[10px] bg-gradient-to-t from-black w-full truncate font-bold">${v.title}</div>
                </div>
            `).join('');
        }

        function renderPosts() {
            const container = document.getElementById('post-container');
            const start = (currentPage - 1) * postsPerPage;
            const pageData = posts.slice().reverse().slice(start, start + postsPerPage);
            container.innerHTML = pageData.map(p => `
                <div onclick="openDetail(${p.id})" class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 active-scale">
                    <div class="text-[15px] font-bold text-gray-900 mb-1">${p.title}</div>
                    <div class="text-[12px] text-gray-400 line-clamp-2 mb-3 leading-relaxed">${p.content}</div>
                    <img src="${p.images[0]}" class="w-24 h-16 object-cover rounded-xl border border-gray-50">
                </div>
            `).join('');
            document.getElementById('page-info').innerText = `PAGE ${currentPage}`;
            document.getElementById('prev-btn').disabled = currentPage === 1;
            document.getElementById('next-btn').disabled = (start + postsPerPage) >= posts.length;
        }

        function playVideo(url) { const p = document.getElementById('main-player'); p.src = url; document.getElementById('video-play-page').style.display = 'flex'; p.play(); }
        function closeVideoPlay() { document.getElementById('main-player').pause(); document.getElementById('video-play-page').style.display = 'none'; }
        function openDetail(id) {
            const p = posts.find(x => x.id === id);
            document.getElementById('detail-content').innerHTML = `<h1 class="text-xl font-bold mb-4">${p.title}</h1><div class="text-sm text-gray-600 mb-6 whitespace-pre-wrap">${p.content}</div>${p.images.map(img => `<img src="${img}" class="w-full rounded-2xl mb-4 shadow-sm">`).join('')}`;
            document.getElementById('detail-page').style.display = 'flex';
        }
        function closeDetail() { document.getElementById('detail-page').style.display = 'none'; }
        function openVideoPage() { document.getElementById('video-page').style.display = 'flex'; renderVideoGrid(); }
        function closeVideoPage() { document.getElementById('video-page').style.display = 'none'; }
        function changePage(step) { currentPage += step; window.scrollTo(0,0); renderPosts(); }
        function renderVideoGrid() { document.getElementById('video-list-grid').innerHTML = videos.map(v => `<div onclick="playVideo('${v.url}')" class="relative aspect-[3/4] rounded-2xl overflow-hidden shadow-md"><img src="${v.cover}" class="w-full h-full object-cover"><div class="absolute bottom-0 p-3 bg-black/40 w-full text-white text-xs font-bold">${v.title}</div></div>`).join(''); }
    </script>

    <script type="text/javascript">
    var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
    (function(){
    var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
    s1.async=true;
    s1.src='https://embed.tawk.to/67ede97a6e37941913988636/1imrtg97t';
    s1.charset='UTF-8';
    s1.setAttribute('crossorigin','*');
    s0.parentNode.insertBefore(s1,s0);
    })();
    </script>
</body>
</html>
